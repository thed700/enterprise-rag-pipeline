  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FRONTEND_URL: ${{ github.event.inputs.frontend_url || vars.FRONTEND_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            zip \
            git \
            build-essential \
            ccache \
            libffi-dev \
            libssl-dev \
            python3-pip

      - name: Install Buildozer and Kivy
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Write mobile wrapper
        run: |
          mkdir -p mobile

          cat > mobile/main.py <<'PY'
          from __future__ import annotations
          import os

          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label

          try:
              from kivy_garden.webview import WebView
          except Exception:
              WebView = None


          class AuraRAGMobile(App):
              def build(self):
                  root = BoxLayout(orientation="vertical")

                  url = os.environ.get("FRONTEND_URL", "").strip()

                  root.add_widget(
                      Label(
                          text="AuraRAG",
                          size_hint_y=None,
                          height=48
                      )
                  )

                  if WebView is not None and url:
                      root.add_widget(WebView(url=url))
                  else:
                      root.add_widget(
                          Label(
                              text=f"Open this URL in a browser:\n{url or 'FRONTEND_URL not set'}"
                          )
                      )

                  return root


          if __name__ == "__main__":
              AuraRAGMobile().run()
          PY

          cat > buildozer.spec <<'SPEC'
          [app]
          title = AuraRAG
          package.name = aurarag
          package.domain = org.aurarag

          source.dir = mobile
          source.include_exts = py,png,jpg,kv,json

          version = 3.5.0

          requirements = python3,kivy,requests,kivy_garden.webview

          orientation = portrait
          fullscreen = 0

          android.permissions = INTERNET
          android.api = 33
          android.minapi = 24
          android.ndk = 25b

          android.archs = arm64-v8a,armeabi-v7a
          android.allow_backup = True

          [buildozer]
          log_level = 2
          warn_on_root = 1
          SPEC

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurarag-android-apk
          path: bin/*.apk