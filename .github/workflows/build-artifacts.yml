name: build-artifacts

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: "Public AuraRAG frontend URL for the Android wrapper"
        required: true
        type: string
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  windows-exe:
    name: Build Windows bundle
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch first to avoid pulling the multi-GB GPU variant
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      # BUG-AK fix: create a real icon so PyInstaller doesn't FileNotFoundError.
      # We generate a minimal 1×1 transparent ICO using Python itself — no
      # external tools required on the runner.
      - name: Generate placeholder icon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          python -c "
          import struct, zlib, os

          def make_ico(path):
              # 1x1 transparent PNG embedded in an ICO container
              def png_chunk(tag, data):
                  c = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', c)

              ihdr = struct.pack('>IIBBBBB', 1, 1, 8, 2, 0, 0, 0)
              idat = zlib.compress(b'\x00\x00\x00\x00')
              png = (b'\x89PNG\r\n\x1a\n' +
                     png_chunk(b'IHDR', ihdr) +
                     png_chunk(b'IDAT', idat) +
                     png_chunk(b'IEND', b''))

              # ICO header + one directory entry + PNG data
              ico  = struct.pack('<HHH', 0, 1, 1)         # reserved, type=1, count=1
              ico += struct.pack('<BBBBHHII',
                                 1, 1, 0, 0, 1, 32,       # w h colorCount reserved planes bpp
                                 len(png),                  # size of image data
                                 6 + 16)                    # offset to image data (header+entry)
              ico += png
              with open(path, 'wb') as f:
                  f.write(ico)

          make_ico(r'assets\icon.ico')
          print('icon.ico written')
          "

      - name: Write Windows launcher
        shell: pwsh
        run: |
          @'
          from __future__ import annotations

          import os
          import pathlib
          import threading
          import time
          import webbrowser

          import streamlit.web.cli as stcli
          import uvicorn

          ROOT = pathlib.Path(__file__).resolve().parent
          UI_SCRIPT = ROOT / "app" / "ui.py"

          def run_api() -> None:
              config = uvicorn.Config(
                  "app.main:app",
                  host="127.0.0.1",
                  port=8000,
                  log_level="warning",
                  access_log=False,
              )
              server = uvicorn.Server(config)
              server.run()

          def run_ui() -> None:
              time.sleep(2)
              webbrowser.open("http://127.0.0.1:8501", new=1)
              import sys
              sys.argv = [
                  "streamlit",
                  "run",
                  str(UI_SCRIPT),
                  "--server.address=127.0.0.1",
                  "--server.port=8501",
                  "--server.headless=true",
                  "--browser.gatherUsageStats=false",
              ]
              stcli.main()

          if __name__ == "__main__":
              api_thread = threading.Thread(target=run_api, daemon=True)
              api_thread.start()
              run_ui()
          '@ | Set-Content -Encoding UTF8 launcher.py

      - name: Package bundle
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onedir --name AuraRAG `
            --icon assets\icon.ico `
            --add-data "app;app" `
            --add-data "data;data" `
            launcher.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurarag-windows-bundle
          path: dist/AuraRAG

  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FRONTEND_URL: ${{ github.event.inputs.frontend_url || vars.FRONTEND_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # BUG-AL fix: the previous workflow used actions/setup-node + npm cache
      # for a pure-Python Buildozer project.  Node is not needed; the npm cache
      # path didn't exist on the runner, causing an immediate failure.
      # Removed the node setup step entirely.

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk unzip zip git \
            build-essential ccache libffi-dev libssl-dev \
            python3-pip

      - name: Install Buildozer and Kivy
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      - name: Write mobile wrapper
        run: |
          mkdir -p mobile
          cat > mobile/main.py <<'PY'
          from __future__ import annotations

          import os

          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label

          try:
              from kivy_garden.webview import WebView
          except Exception:
              WebView = None

          class AuraRAGMobile(App):
              def build(self):
                  root = BoxLayout(orientation="vertical")
                  url = os.environ.get("FRONTEND_URL", "").strip()
                  root.add_widget(Label(text="AuraRAG", size_hint_y=None, height=48))
                  if WebView is not None and url:
                      root.add_widget(WebView(url=url))
                  else:
                      root.add_widget(Label(text=f"Open this URL in a browser:\n{url or 'FRONTEND_URL not set'}"))
                  return root

          if __name__ == "__main__":
              AuraRAGMobile().run()
          PY

          cat > buildozer.spec <<'SPEC'
          [app]
          title = AuraRAG
          package.name = aurarag
          package.domain = org.aurarag
          source.dir = mobile
          source.include_exts = py,png,jpg,kv,json
          version = 3.4.0
          requirements = python3,kivy,requests,kivy_garden.webview
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 24
          android.ndk = 25b
          android.archs = arm64-v8a,armeabi-v7a
          android.allow_backup = True

          [buildozer]
          log_level = 2
          warn_on_root = 1
          SPEC

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurarag-android-apk
          path: bin/*.apk
