# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — AuraRAG v3.1.0
# Author: Akmal Raxmatov (github: thed700)
#
# Changes v3.1.0:
#   BUG-M: Removed deprecated top-level 'version:' key (Docker Compose v2+).
#   BUG-N: Per-service HEALTHCHECK moved here from Dockerfile so API (8000)
#          and UI (8501) containers use the correct port each.
#   NEW:   redis service for future per-session memory persistence (v3.2).
#          Currently only used as a placeholder — comment out to skip.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: aurarag_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    networks:
      - internal
    volumes:
      - chroma_data:/app/data/chroma_db
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost:8501,http://ui:8501
    # BUG-N fix: healthcheck here targets port 8000 (API only)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: aurarag_ui
    command: streamlit run app/ui.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    networks:
      - internal
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8000
    # BUG-N fix: healthcheck here targets port 8501 (UI only)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis (session memory — v3.2 milestone) ──────────────────────────────────
  # Uncomment when per-session Redis memory is wired into engine.py (v3.2).
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: aurarag_redis
  #   networks:
  #     - internal
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes
  #   restart: unless-stopped

  # ── Ollama (optional local LLM) ──────────────────────────────────────────────
  # Uncomment and select "Local (Ollama)" in the UI to run local models.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: aurarag_ollama
  #   ports:
  #     - "11434:11434"
  #   networks:
  #     - internal
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  chroma_data:
    driver: local
  # redis_data:
  #   driver: local
  # ollama_data:
  #   driver: local
